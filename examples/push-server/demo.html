<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Protocol Demo</title>
  <script type="module" src="/src/styles/tokens.css"></script>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body {
      background: #0a1015;
      font-family: var(--font-mono);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
    }

    /* ════════════════════════════════════════════════════════════════
       TOP BAR
       ════════════════════════════════════════════════════════════════ */
    .topbar {
      height: 32px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: var(--surface-elevated);
      border-bottom: 2px solid var(--color-primary);
      flex-shrink: 0;
      gap: 16px;
    }
    .topbar .app-name {
      color: var(--color-primary);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .topbar .divider {
      color: var(--border-default);
      font-size: 0.7rem;
    }
    .topbar button {
      background: transparent;
      color: var(--color-primary);
      border: 1px solid var(--color-primary);
      padding: 2px 12px;
      font-family: inherit;
      font-size: 0.65rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .topbar button:hover {
      background: var(--color-primary);
      color: var(--surface-base);
    }
    .topbar .version {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
    }

    /* ════════════════════════════════════════════════════════════════
       MAIN GRID — fixed zones like the MGS2 photo viewer
       ════════════════════════════════════════════════════════════════ */
    .main-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr auto;
      grid-template-areas:
        "status   status"
        "activity progress"
        "activity summary";
      gap: 1px;
      background: var(--border-default);
      min-height: 0;
    }

    /* ── Zone base style ── */
    .zone {
      background: var(--surface-base);
      min-height: 0;
      position: relative;
    }
    .zone-label {
      position: absolute;
      top: 4px; left: 8px;
      font-size: 0.55rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Status zone: horizontal strip across top ── */
    .zone-status {
      grid-area: status;
      display: flex;
      gap: 1px;
      background: var(--border-default);
      min-height: 52px;
    }
    .status-slot {
      flex: 1;
      background: var(--surface-base);
      display: flex;
      align-items: center;
      padding: 8px 12px;
      gap: 8px;
      font-size: 0.75rem;
      transition: opacity 0.3s, background 0.3s;
    }
    .status-slot.empty {
      opacity: 0.3;
    }
    .status-slot .indicator {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }
    .status-slot .indicator.success { background: var(--color-success, #00ff88); }
    .status-slot .indicator.error   { background: var(--color-error, #ff4444); }
    .status-slot .indicator.pending { background: var(--color-primary); animation: pulse 1s infinite; }
    .status-slot .indicator.info    { background: var(--color-primary); }
    .status-slot .indicator.warn    { background: #ffaa00; }
    .status-slot .label {
      color: var(--text-muted);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      width: 50px;
      flex-shrink: 0;
    }
    .status-slot .message {
      color: var(--text-primary);
      font-size: 0.7rem;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Activity zone: left column, full height ── */
    .zone-activity {
      grid-area: activity;
      display: flex;
      flex-direction: column;
    }
    .activity-header {
      padding: 6px 10px;
      font-size: 0.6rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      border-bottom: 1px solid var(--border-default);
      flex-shrink: 0;
    }
    .activity-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
      font-size: 0.75rem;
      line-height: 1.6;
    }
    .activity-body::-webkit-scrollbar { width: 4px; }
    .activity-body::-webkit-scrollbar-track { background: transparent; }
    .activity-body::-webkit-scrollbar-thumb { background: var(--border-default); }

    /* ── Progress zone: top-right ── */
    .zone-progress {
      grid-area: progress;
      padding: 20px 16px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
    }
    .progress-bar {
      transition: opacity 0.4s;
    }
    .progress-bar.hidden { opacity: 0; }
    .progress-label {
      font-size: 0.7rem;
      color: var(--text-primary);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .progress-stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .progress-track {
      height: 10px;
      background: var(--surface-elevated);
      border: 1px solid var(--border-default);
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--color-primary);
      transition: width 0.25s ease;
      width: 0%;
    }
    .progress-fill.complete {
      background: var(--color-success, #00ff88);
    }

    /* ── Summary zone: bottom-right ── */
    .zone-summary {
      grid-area: summary;
      padding: 8px 0;
      display: flex;
      flex-direction: column;
    }
    .summary-header {
      padding: 0 12px 6px;
      font-size: 0.6rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      border-bottom: 1px solid var(--border-default);
    }
    .summary-table {
      font-size: 0.75rem;
    }
    .summary-row {
      display: flex;
      padding: 4px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .summary-row.header {
      color: var(--color-primary);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .summary-row .col {
      flex: 1;
    }
    .summary-row .col:last-child {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .summary-empty {
      color: var(--text-muted);
      font-style: italic;
      font-size: 0.7rem;
      padding: 12px;
      opacity: 0.4;
    }
  </style>
</head>
<body>

  <!-- ── Top bar ── -->
  <div class="topbar">
    <span class="app-name">spotify-dl</span>
    <span class="divider">|</span>
    <button id="btn-run">Run Download</button>
    <span class="version">retro-tui protocol v1</span>
  </div>

  <!-- ── Main grid with fixed zones ── -->
  <div class="main-grid">

    <!-- Status strip across top -->
    <div class="zone zone-status" id="status-zone">
      <div class="status-slot empty" id="status-auth">
        <div class="indicator"></div>
        <span class="label">auth</span>
        <span class="message">--</span>
      </div>
      <div class="status-slot empty" id="status-fetch">
        <div class="indicator"></div>
        <span class="label">fetch</span>
        <span class="message">--</span>
      </div>
      <div class="status-slot empty" id="status-tag">
        <div class="indicator"></div>
        <span class="label">tag</span>
        <span class="message">--</span>
      </div>
    </div>

    <!-- Activity log: left column -->
    <div class="zone zone-activity">
      <div class="activity-header">activity</div>
      <div class="activity-body" id="activity-body"></div>
    </div>

    <!-- Progress: top-right -->
    <div class="zone zone-progress" id="progress-zone">
      <span class="zone-label">progress</span>
      <div class="progress-bar hidden" id="progress-main">
        <div class="progress-label" id="progress-label">--</div>
        <div class="progress-stats">
          <span id="progress-count"></span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>
    </div>

    <!-- Summary table: bottom-right -->
    <div class="zone zone-summary">
      <div class="summary-header">summary</div>
      <div id="summary-body">
        <div class="summary-empty">Waiting for data...</div>
      </div>
    </div>

  </div>

<script type="module">
  import { ansiToHtml } from '/src/utils/ansi.js';

  // ─── Activity log ──────────────────────────────────────────────────
  const activityBody = document.getElementById('activity-body');

  function nearBottom() {
    return activityBody.scrollHeight - activityBody.scrollTop - activityBody.clientHeight < 40;
  }

  function logAppend(text) {
    const wasNear = nearBottom();
    const line = document.createElement('div');
    line.innerHTML = ansiToHtml(text);
    line.style.whiteSpace = 'pre-wrap';
    line.style.wordBreak = 'break-all';
    activityBody.appendChild(line);
    if (wasNear) activityBody.scrollTop = activityBody.scrollHeight;
  }

  function logClear() {
    activityBody.innerHTML = '';
  }

  // ─── Status slots ──────────────────────────────────────────────────
  function setStatus(slotId, state, message) {
    const slot = document.getElementById(slotId);
    if (!slot) return;
    slot.classList.remove('empty');
    slot.querySelector('.indicator').className = 'indicator ' + state;
    slot.querySelector('.message').textContent = message;
  }

  function clearStatus(slotId) {
    const slot = document.getElementById(slotId);
    if (!slot) return;
    slot.classList.add('empty');
    slot.querySelector('.indicator').className = 'indicator';
    slot.querySelector('.message').textContent = '--';
  }

  // ─── Progress ──────────────────────────────────────────────────────
  const progressBar = document.getElementById('progress-main');
  const progressLabel = document.getElementById('progress-label');
  const progressCount = document.getElementById('progress-count');
  const progressPct = document.getElementById('progress-pct');
  const progressFill = document.getElementById('progress-fill');

  function setProgress(value, label, total, current) {
    progressBar.classList.remove('hidden');
    const pct = Math.round(Math.min(1, Math.max(0, value)) * 100);
    progressLabel.textContent = label || '';
    progressCount.textContent = total ? `${current || 0}/${total}` : '';
    progressPct.textContent = pct + '%';
    progressFill.style.width = pct + '%';
    progressFill.classList.toggle('complete', value >= 1);
  }

  function clearProgress() {
    progressBar.classList.add('hidden');
    progressFill.style.width = '0%';
    progressFill.classList.remove('complete');
  }

  // ─── Summary table ─────────────────────────────────────────────────
  const summaryBody = document.getElementById('summary-body');

  function setSummary(columns, rows) {
    let html = '<div class="summary-table">';
    html += '<div class="summary-row header">';
    for (const col of columns) html += `<span class="col">${col}</span>`;
    html += '</div>';
    for (const row of rows) {
      html += '<div class="summary-row">';
      for (const col of columns) html += `<span class="col">${row[col] ?? ''}</span>`;
      html += '</div>';
    }
    html += '</div>';
    summaryBody.innerHTML = html;
  }

  function clearSummary() {
    summaryBody.innerHTML = '<div class="summary-empty">Waiting for data...</div>';
  }

  // ─── Helpers ───────────────────────────────────────────────────────
  function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
  }

  const tracks = [
    'Heart - These Dreams',
    'Mr. Mister - Broken Wings',
    'Eurythmics - Here Comes the Rain Again',
    'Laura Branigan - Gloria',
    'Wilson Phillips - Hold On',
    'Bananarama - Cruel Summer',
  ];

  function clearAll() {
    logClear();
    clearStatus('status-auth');
    clearStatus('status-fetch');
    clearStatus('status-tag');
    clearProgress();
    clearSummary();
  }

  let running = false;

  // ─── Simulation ────────────────────────────────────────────────────
  document.getElementById('btn-run').addEventListener('click', async () => {
    if (running) return;
    running = true;
    clearAll();

    // ── Auth ──
    setStatus('status-auth', 'pending', 'Authenticating...');
    logAppend('Authenticating with Spotify...');
    await sleep(1000);

    setStatus('status-auth', 'success', 'Authenticated');
    logAppend('\x1b[32m\u2713\x1b[0m Authenticated successfully.');
    await sleep(600);

    // ── Fetch ──
    setStatus('status-fetch', 'pending', 'Fetching playlist...');
    logAppend('\nFetching "These Dreams"...');
    await sleep(800);

    setStatus('status-fetch', 'success', '"These Dreams": 6 tracks');
    logAppend('\x1b[32m\u2713\x1b[0m Fetched "These Dreams": 6 tracks (0 skipped)');
    await sleep(400);

    // ── Download ──
    setProgress(0, 'Starting...', tracks.length, 0);
    setSummary(['Metric', 'Count'], [
      { Metric: 'Downloaded', Count: 0 },
      { Metric: 'Tagged', Count: 0 },
      { Metric: 'Remaining', Count: tracks.length },
    ]);
    logAppend(`\nDownloading "These Dreams" (${tracks.length} tracks)\n`);

    let downloaded = 0;

    for (let i = 0; i < tracks.length; i++) {
      const track = tracks[i];

      setProgress(i / tracks.length, track, tracks.length, i);
      logAppend(`[${i+1}/${tracks.length}] Downloading: ${track}`);
      await sleep(400 + Math.random() * 600);

      downloaded++;
      logAppend(`  \x1b[32mOK\x1b[0m: ${track}.mp3`);

      setSummary(['Metric', 'Count'], [
        { Metric: 'Downloaded', Count: downloaded },
        { Metric: 'Tagged', Count: 0 },
        { Metric: 'Remaining', Count: tracks.length - downloaded },
      ]);
    }

    setProgress(1, 'Download complete', tracks.length, tracks.length);
    logAppend('');
    await sleep(800);

    // ── Tagging ──
    setStatus('status-tag', 'pending', 'Tagging files...');
    logAppend('Tagging "These Dreams"...');

    let tagged = 0;
    for (let i = 0; i < tracks.length; i++) {
      await sleep(200);
      tagged++;
      logAppend(`  \x1b[36mTAGGED\x1b[0m: ${tracks[i]}.mp3`);
      setSummary(['Metric', 'Count'], [
        { Metric: 'Downloaded', Count: downloaded },
        { Metric: 'Tagged', Count: tagged },
        { Metric: 'Failed', Count: 0 },
      ]);
    }

    setStatus('status-tag', 'success', `${tagged} tagged, 0 failed`);
    logAppend(`\n\x1b[32m\u2713\x1b[0m Tagging complete: ${tagged} tagged, 0 skipped, 0 failed`);

    logAppend('\n--- Summary ---');
    logAppend(`Downloaded: ${downloaded}`);
    logAppend('Skipped:    0');
    logAppend('Failed:     0');

    // Fade out progress after completion
    await sleep(2000);
    clearProgress();

    running = false;
  });
</script>
</body>
</html>
