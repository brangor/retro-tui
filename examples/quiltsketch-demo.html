<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QuiltSketch Demo - RetroTUI Migration</title>
  <style>
    body { margin: 0; background: var(--bg, #1a1a2e); color: var(--text, #eee); }
    .palette { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; }
    .palette button {
      width: 32px; height: 32px; border: 2px solid transparent;
      cursor: pointer; border-radius: 0;
    }
    .palette button.active { border-color: #fff; }
  </style>
</head>
<body>
  <tui-app>
    <tui-workspace>
      <div slot="main" style="padding: 1rem; overflow: auto;">
        <tui-canvas
          id="canvas"
          projection="triangular"
          width="8"
          height="8"
          cell-size="50"
          show-grid
        >
          <svg id="quilt-svg" style="position:absolute;inset:0;pointer-events:none;"
               viewBox="0 0 400 400" width="400" height="400"></svg>
        </tui-canvas>
      </div>

      <tui-panel slot="sidebar-left" title="Tools">
        <tui-toolbar id="toolbar" orientation="vertical" selected="paint"></tui-toolbar>
      </tui-panel>

      <tui-panel slot="sidebar-right" title="Palette">
        <div class="palette" id="palette"></div>
      </tui-panel>
    </tui-workspace>
  </tui-app>

  <script type="module">
    // Import components (registers custom elements)
    import '../src/components/tui-app.ts';
    import '../src/components/tui-workspace.ts';
    import '../src/components/tui-panel.ts';
    import '../src/components/tui-toolbar.ts';
    import '../src/components/tui-canvas.ts';
    import { ToolState } from '../src/state/tool-state.ts';
    import { TriangularProjection } from '../src/projections/triangular.ts';

    // Tool config with two groups
    const toolConfig = {
      groups: {
        brush: { exclusive: true },
        symmetry: { exclusive: false },
      },
      tools: [
        { id: 'paint', group: 'brush', icon: 'P', name: 'Paint', key: 'p' },
        { id: 'erase', group: 'brush', icon: 'E', name: 'Erase', key: 'e' },
        { id: 'fill', group: 'brush', icon: 'F', name: 'Fill', key: 'f' },
        { id: 'sym-h', group: 'symmetry', icon: '↔', name: 'H Mirror', key: 'h' },
        { id: 'sym-v', group: 'symmetry', icon: '↕', name: 'V Mirror', key: 'v' },
      ],
    };

    const toolState = new ToolState(toolConfig);
    toolState.selectTool('paint');

    const toolbar = document.getElementById('toolbar');
    toolbar.tools = toolConfig.tools;

    // Color palette
    const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6', '#1abc9c', '#e67e22', '#ecf0f1'];
    let currentColor = colors[0];

    const paletteEl = document.getElementById('palette');
    colors.forEach((color, i) => {
      const btn = document.createElement('button');
      btn.style.background = color;
      if (i === 0) btn.classList.add('active');
      btn.addEventListener('click', () => {
        currentColor = color;
        paletteEl.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
      paletteEl.appendChild(btn);
    });

    // Grid: 8x8 cells, each with 4 triangle regions
    const W = 8, H = 8;
    const grid = Array(H).fill(null).map(() =>
      Array(W).fill(null).map(() => ({}))
    );

    const projection = new TriangularProjection(50);

    // Tool event handling
    toolbar.addEventListener('tool-select', (e) => {
      const toolId = e.detail.tool;
      const tool = toolConfig.tools.find(t => t.id === toolId);
      if (!tool) return;

      const group = toolConfig.groups[tool.group];
      if (group.exclusive) {
        toolState.selectTool(toolId);
        toolbar.selected = toolId;
      } else {
        toolState.toggleTool(toolId);
        // Non-exclusive tools are toggles; keep the brush tool as the primary selected
      }
    });

    // Paint with symmetry
    function paintAt(x, y, region) {
      if (x < 0 || x >= W || y < 0 || y >= H) return;

      if (toolState.isActive('erase')) {
        delete grid[y][x][region];
      } else {
        grid[y][x][region] = { color: currentColor };
      }
    }

    // Fill all regions of a cell
    function fillAt(x, y) {
      if (x < 0 || x >= W || y < 0 || y >= H) return;

      for (const region of ['top', 'right', 'bottom', 'left']) {
        grid[y][x][region] = { color: currentColor };
      }
    }

    function getMirrorRegionH(region) {
      return { left: 'right', right: 'left', top: 'top', bottom: 'bottom' }[region];
    }

    function getMirrorRegionV(region) {
      return { top: 'bottom', bottom: 'top', left: 'left', right: 'right' }[region];
    }

    // Canvas draw
    const canvas = document.getElementById('canvas');
    canvas.addEventListener('canvas-draw', (e) => {
      const { x, y, region } = e.detail;
      if (!region) return;

      if (toolState.isActive('fill')) {
        fillAt(x, y);

        if (toolState.isActive('sym-h')) {
          fillAt(W - 1 - x, y);
        }
        if (toolState.isActive('sym-v')) {
          fillAt(x, H - 1 - y);
        }
        if (toolState.isActive('sym-h') && toolState.isActive('sym-v')) {
          fillAt(W - 1 - x, H - 1 - y);
        }

        renderCanvas();
        return;
      }

      // Paint original
      paintAt(x, y, region);

      // Horizontal symmetry
      if (toolState.isActive('sym-h')) {
        const mx = W - 1 - x;
        paintAt(mx, y, getMirrorRegionH(region));
      }

      // Vertical symmetry
      if (toolState.isActive('sym-v')) {
        const my = H - 1 - y;
        paintAt(x, my, getMirrorRegionV(region));
      }

      // Both symmetries = diagonal mirror
      if (toolState.isActive('sym-h') && toolState.isActive('sym-v')) {
        const mx = W - 1 - x;
        const my = H - 1 - y;
        paintAt(mx, my, getMirrorRegionH(getMirrorRegionV(region)));
      }

      renderCanvas();
    });

    // Render all triangles
    function renderCanvas() {
      const svg = document.getElementById('quilt-svg');
      let paths = '';

      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const cell = grid[y][x];
          for (const region of ['top', 'right', 'bottom', 'left']) {
            if (cell[region]) {
              const d = projection.getCellPath(x, y, region);
              paths += `<path d="${d}" fill="${cell[region].color}" stroke="${cell[region].color}" stroke-width="0.5"/>`;
            }
          }
        }
      }

      svg.innerHTML = paths;
    }

    renderCanvas();
  </script>
</body>
</html>
