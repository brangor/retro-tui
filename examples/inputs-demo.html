<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroTUI - Input Components Demo</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-light: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-dim: #8b949e;
      --cyan: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --magenta: #bc8cff;
      --red: #f85149;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .panel-content {
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .separator {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.25rem 0;
    }

    .event-log {
      font-size: 0.75rem;
      color: var(--text-dim);
      max-height: 200px;
      overflow-y: auto;
      padding: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
    }

    .event-log .entry {
      padding: 2px 0;
      border-bottom: 1px solid #1a1f29;
    }

    .event-log .entry .event-name {
      color: var(--cyan);
    }

    .event-log .entry .event-data {
      color: var(--green);
    }

    .main-content {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      font-size: 0.85rem;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <tui-workspace style="height: 100vh;">
    <div slot="main">
      <div class="main-content">
        <div>
          ░░ INPUT COMPONENTS DEMO ░░<br>
          Drag panels around the workspace<br>
          Interact with form controls and watch the event log
        </div>
      </div>
    </div>

    <!-- Settings Panel -->
    <tui-panel
      slot="floating"
      title="Settings"
      color="primary"
      floating
      collapsible
      position-x="20"
      position-y="20"
      panel-width="280"
      persist-id="inputs-settings"
    >
      <div class="panel-content">
        <tui-input label="Project Name" placeholder="my-project" name="project"></tui-input>
        <tui-input label="Author" placeholder="your name" name="author"></tui-input>
        <hr class="separator">
        <tui-checkbox-group name="features" label="Features">
          <tui-checkbox value="typescript" label="TypeScript" checked></tui-checkbox>
          <tui-checkbox value="tests" label="Unit Tests" checked></tui-checkbox>
          <tui-checkbox value="linting" label="Linting"></tui-checkbox>
          <tui-checkbox value="ci" label="CI Pipeline"></tui-checkbox>
        </tui-checkbox-group>
      </div>
    </tui-panel>

    <!-- Theme Panel -->
    <tui-panel
      slot="floating"
      title="Appearance"
      color="secondary"
      floating
      collapsible
      position-x="320"
      position-y="20"
      panel-width="240"
      persist-id="inputs-theme"
    >
      <div class="panel-content">
        <tui-radio-group name="theme" label="Color Theme" value="terminal">
          <tui-radio value="terminal" label="Terminal"></tui-radio>
          <tui-radio value="cyberpunk" label="Cyberpunk"></tui-radio>
          <tui-radio value="amber" label="Amber CRT"></tui-radio>
          <tui-radio value="green" label="Green Phosphor"></tui-radio>
        </tui-radio-group>
        <hr class="separator">
        <tui-radio-group name="font-size" label="Font Size" value="md">
          <tui-radio value="sm" label="Small"></tui-radio>
          <tui-radio value="md" label="Medium"></tui-radio>
          <tui-radio value="lg" label="Large"></tui-radio>
        </tui-radio-group>
      </div>
    </tui-panel>

    <!-- Connection Panel -->
    <tui-panel
      slot="floating"
      title="Connection"
      color="info"
      floating
      collapsible
      position-x="580"
      position-y="20"
      panel-width="280"
      persist-id="inputs-connection"
    >
      <div class="panel-content">
        <tui-input label="Host" placeholder="localhost" name="host" value="localhost"></tui-input>
        <tui-input label="Port" placeholder="3001" name="port" value="3001"></tui-input>
        <tui-input label="Channel" placeholder="default" name="channel"></tui-input>
        <hr class="separator">
        <tui-checkbox-group name="conn-options" label="Options">
          <tui-checkbox value="auto-reconnect" label="Auto-reconnect" checked></tui-checkbox>
          <tui-checkbox value="ssl" label="Use SSL"></tui-checkbox>
        </tui-checkbox-group>
      </div>
    </tui-panel>

    <!-- Event Log Panel -->
    <tui-panel
      slot="floating"
      title="Event Log"
      color="primary"
      floating
      collapsible
      position-x="20"
      position-y="380"
      panel-width="840"
      panel-height="200"
      persist-id="inputs-eventlog"
    >
      <div class="panel-content">
        <div class="event-log" id="event-log">
          <div class="entry"><span class="event-name">ready</span> — listening for input events</div>
        </div>
      </div>
    </tui-panel>
  </tui-workspace>

  <script type="module" src="../src/index.js"></script>
  <script type="module">
    const log = document.getElementById('event-log');

    function addEntry(name, data) {
      const entry = document.createElement('div');
      entry.className = 'entry';
      entry.innerHTML = `<span class="event-name">${name}</span> — <span class="event-data">${JSON.stringify(data)}</span>`;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
    }

    document.addEventListener('tui-change', (e) => {
      const name = e.target.tagName.toLowerCase();
      addEntry(`${name} change`, e.detail);
    });

    document.addEventListener('tui-input', (e) => {
      const name = e.target.tagName.toLowerCase();
      addEntry(`${name} input`, e.detail);
    });
  </script>
</body>
</html>
