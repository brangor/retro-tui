<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RetroTUI</title>
  <script type="module" src="/src/styles/tokens.css"></script>
  <script type="module" src="/src/components/tui-app.ts"></script>
  <script type="module" src="/src/components/tui-button.ts"></script>
  <style>
    body {
      background: var(--surface-base);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .crt-bezel {
      background: var(--surface-elevated);
      border-radius: 24px;
      padding: 32px;
      max-width: 900px;
      width: 90vw;
      aspect-ratio: 4 / 3;
      display: flex;
    }

    .crt-screen {
      background: var(--surface-elevated);
      border-radius: 8px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px;
      gap: 48px;
    }
    .screen-title {
      color: var(--color-primary);
      font-size: 1.2rem;
      font-weight: normal;
      letter-spacing: var(--spacing-sm);
      text-transform: uppercase;
    }

    .program-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      width: 100%;
      max-width: 600px;
    }

    .program-link {
      text-decoration: none;
      display: contents; /* lets tui-button fill the grid cell */
    }

    .program-tile {
      aspect-ratio: 3 / 2;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    
      --tui-button-border-color: var(--color-primary);
      --tui-button-color: var(--color-primary);
      --tui-button-bg: transparent;
    }

    .program-tile.empty {
      border: var(--border-width) solid var(--color-primary);
      opacity: 0.3;
      cursor: not-allowed;
    }

    .program-grid tui-button {
      display:block;
      width: 100%;
      height: 100%;
      
                                                             
      --tui-button-bg: transparent;                                                                         
      --tui-button-color: var(--color-primary);                                                                          
      --tui-button-border-color: var(--color-primary);
      --tui-button-hover-bg: var(--color-primary);
      --tui-button-hover-color: var(--surface-base);
      --tui-button-hover-border-color: var(--color-primary);

      &::hover {
        border-color: var(--color-primary);
      }

      &::part(button) {
        height: 100%;
      }
    }

    .program-grid a {
      text-decoration: none;
      display: block;
      aspect-ratio: 3 / 2;
    }
  </style>
</head>
<body class="theme-home-security-interface">
  <div class="crt-bezel">
    <div class="crt-screen">
      <h1 class="screen-title">SELECT PROGRAM</h1>
      <div class="program-grid">
        <a href="/examples/isosketch.html" tabindex="-1">
          <tui-button class="program-tile">ISOSKETCH</tui-button>
        </a>
        <a href="/examples/quiltsketch-demo.html" tabindex="-1">
          <tui-button class="program-tile">QUILTSKETCH DEMO</tui-button>
        </a>
        <a href="/examples/panels-demo.html" tabindex="-1">
          <tui-button class="program-tile">PANELS DEMO</tui-button>
        </a>
          <a href="https://quiltsketch.vercel.app/" tabindex="-1">
          <tui-button class="program-tile">LIVE QUILTSKETCH</tui-button>
        </a>
        <div class="program-tile empty"></div>
        <div class="program-tile empty"></div>
      </div>
    </div>
  </div>
</body>
<script type="module">
  const grid = document.querySelector('.program-grid');
  const buttons = [...grid.querySelectorAll('tui-button')];
  const cols = 3;

  // Focus the first button on load so keyboard works immediately
  buttons[0]?.focus();

  document.addEventListener('keydown', (e) => {
    const idx = buttons.indexOf(document.activeElement);
    if (idx === -1) return;

    let next = idx;
    switch(e.key) {
      case 'ArrowRight': next = idx + 1; break;
      case 'ArrowLeft': next = idx - 1; break;
      case 'ArrowDown': next = idx + cols; break;
      case 'ArrowUp': next = idx - cols; break;
      case 'Enter':
        const link = buttons[idx].closest('a');
        if (link) window.location.href = link.href;
        return;
      default: return;
    }

    if (next >= 0 && next < buttons.length) {
      e.preventDefault();
      buttons[next].focus();
    }
  });
</script>
</html>
